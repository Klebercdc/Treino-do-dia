name: Cleanup iOS safe area residue

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cleanup-ios-safe-area-residue.yml'

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Cleanup backup residue
        run: |
          python3 <<'PY'
          from pathlib import Path

          old_viewport = '<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0"/>'
          new_viewport = '<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">'

          changed = []
          for path in Path('.').rglob('*.html'):
              if '.git' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8')
              new_text = text.replace(old_viewport, new_viewport)
              if new_text != text:
                  path.write_text(new_text, encoding='utf-8')
                  changed.append(str(path))

          workflow = Path('.github/workflows/cleanup-ios-safe-area-residue.yml')
          if workflow.exists():
              workflow.unlink()

          print('Arquivos HTML corrigidos:', ', '.join(changed) if changed else 'nenhum')
          PY

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No residue changes to commit"
          else
            git add -A
            git commit -m "chore: limpa resíduos de viewport antigo"
            git push
          fi

name: Testes E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Evita flakiness/download 403 do CDN do Playwright
    # usando imagem oficial já com browsers instalados.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    env:
      # Banco de testes (configurar nos Secrets do repositório)
      VITE_SUPABASE_URL_TEST:          ${{ secrets.VITE_SUPABASE_URL_TEST }}
      VITE_SUPABASE_SERVICE_KEY_TEST:  ${{ secrets.VITE_SUPABASE_SERVICE_KEY_TEST }}
      VITE_SUPABASE_DB_URL_TEST:       ${{ secrets.VITE_SUPABASE_DB_URL_TEST }}
      PLAYWRIGHT_BASE_URL:             http://localhost:3000

    steps:
      # ── 1. Código ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      # ── 3. Gera .env.test a partir dos Secrets ────────────────────────────
      - name: Criar .env.test
        run: |
          cat > .env.test << 'EOF'
          VITE_SUPABASE_URL_TEST=${{ secrets.VITE_SUPABASE_URL_TEST }}
          VITE_SUPABASE_SERVICE_KEY_TEST=${{ secrets.VITE_SUPABASE_SERVICE_KEY_TEST }}
          VITE_SUPABASE_DB_URL_TEST=${{ secrets.VITE_SUPABASE_DB_URL_TEST }}
          EOF

      - name: Validar secrets de teste
        id: test_secrets
        run: |
          if [ -n "$VITE_SUPABASE_URL_TEST" ] && [ -n "$VITE_SUPABASE_SERVICE_KEY_TEST" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "✅ Secrets de teste detectados."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Secrets de teste ausentes. Testes E2E serão ignorados neste run."
          fi

      # ── 4. Gates de saúde e prontidão ─────────────────────────────────────
      - name: System Check
        id: system_check
        if: ${{ steps.test_secrets.outputs.available == 'true' }}
        env:
          SUPABASE_URL:              ${{ secrets.VITE_SUPABASE_URL_TEST }}
          SUPABASE_ANON_KEY:         ${{ secrets.VITE_SUPABASE_ANON_KEY_TEST }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_KEY_TEST }}
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY_TEST }}
        run: npm run system:check

      - name: Release Readiness
        if: ${{ steps.test_secrets.outputs.available == 'true' }}
        env:
          SUPABASE_URL:              ${{ secrets.VITE_SUPABASE_URL_TEST }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_KEY_TEST }}
        run: npm run release:readiness

      # ── 5. Migration no banco de testes (se secrets configurados) ─────────
      - name: Aplicar migration no banco de testes
        if: ${{ steps.test_secrets.outputs.available == 'true' && env.VITE_SUPABASE_DB_URL_TEST != '' }}
        run: |
          npx supabase db push --db-url "$VITE_SUPABASE_DB_URL_TEST"
        continue-on-error: true   # não bloqueia se banco de testes não estiver configurado

      # ── 6. Roda os testes ─────────────────────────────────────────────────
      - name: Sanity check (verifica roteamento do banco)
        if: ${{ steps.test_secrets.outputs.available == 'true' }}
        run: npm run test:sanity

      - name: Testes E2E — CTA e Dieta
        if: ${{ steps.test_secrets.outputs.available == 'true' }}
        run: playwright test tests/e2e/cta-diet.spec.ts --reporter=list

      - name: Testes E2E — Registro de Treino
        if: ${{ steps.test_secrets.outputs.available == 'true' }}
        run: npm run test:workout

      - name: Pular E2E quando secrets não estiverem disponíveis
        if: ${{ steps.test_secrets.outputs.available != 'true' }}
        run: echo "E2E ignorado porque os secrets de Supabase não estão disponíveis para este workflow."

      # ── 7. Relatórios e artefatos ─────────────────────────────────────────
      - name: Upload do relatório HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload de screenshots (somente em falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      # ── 8. Resumo no PR ───────────────────────────────────────────────────
      - name: Resumo dos testes no PR
        if: always()
        uses: daun/playwright-report-summary@v3
        with:
          report-file: playwright-report/results.json
        continue-on-error: true   # não falha se o plugin não encontrar o arquivo

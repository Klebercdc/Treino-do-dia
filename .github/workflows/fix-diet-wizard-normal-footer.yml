name: Fix diet wizard normal footer

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-diet-wizard-normal-footer.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch diet wizard footer
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('src/ui/diet/diet-wizard.js')
          text = path.read_text(encoding='utf-8')
          old = '.kdw-footer{position:sticky;bottom:calc(env(safe-area-inset-bottom, 0px) + 16px);background:#020617;padding-top:12px}'
          new = '.kdw-footer{background:#020617;padding-top:12px;padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 16px)}'
          if old not in text and new not in text:
              raise SystemExit('footer sticky pattern not found in diet-wizard.js')
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          workflow = Path('.github/workflows/fix-diet-wizard-normal-footer.yml')
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add -A
            git commit -m "fix: mantém footer da dieta no fluxo normal"
            git push
          fi

project_id = "twxoddzogbmaysebhour"

[auth]
enabled = true
site_url = "https://treino-do-dia-orpin.vercel.app"
additional_redirect_urls = ["https://treino-do-dia-orpin.vercel.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Edge Functions
[functions.telegram-kronia-bot]
verify_jwt = false

[functions.check-inactivity]
verify_jwt = false

[functions.labs-watchdog]
# verify_jwt = false: autenticação própria via CRON_SECRET no header Authorization
verify_jwt = false

project_id = "twxoddzogbmaysebhour"

[auth]
enabled = true
site_url = "https://treino-do-dia-orpin.vercel.app"
additional_redirect_urls = ["https://treino-do-dia-orpin.vercel.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# ── Edge Functions ──────────────────────────────────────────────
# telegram-kronia-bot: webhook do Telegram (não requer JWT)
[functions.telegram-kronia-bot]
verify_jwt = false

# check-inactivity: disparo de Web Push para usuários inativos
[functions.check-inactivity]
verify_jwt = false

# ── Cron Jobs ──────────────────────────────────────────────────
# check-inactivity: roda diariamente às 09:00 UTC
[cron.check-inactivity-daily]
schedule = "0 9 * * *"
function_name = "check-inactivity"

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#020617">
<title>Kronia — Entrar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #020617;
    --card: rgba(15, 23, 42, .82);
    --line: rgba(148, 163, 184, .18);
    --green: #22c55e;
    --cyan: #38bdf8;
    --text: #f8fafc;
    --muted: #94a3b8;
    --soft: #64748b;
    --danger-bg: rgba(248, 113, 113, .11);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; background: var(--bg); }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: max(20px, env(safe-area-inset-top)) 18px max(20px, env(safe-area-inset-bottom));
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    position: relative;
  }
  body::before, body::after {
    content: "";
    position: fixed;
    width: 440px;
    height: 440px;
    border-radius: 50%;
    filter: blur(28px);
    pointer-events: none;
  }
  body::before { top: -190px; right: -170px; background: radial-gradient(circle, rgba(34,197,94,.42), rgba(56,189,248,.08) 52%, transparent 74%); }
  body::after { left: -190px; bottom: -180px; background: radial-gradient(circle, rgba(56,189,248,.34), rgba(34,197,94,.06) 54%, transparent 75%); }
  .login-shell { position: relative; z-index: 1; width: 100%; max-width: 430px; }
  .brand { text-align: center; margin-bottom: 20px; }
  .brand-mark {
    width: 72px;
    height: 72px;
    margin: 0 auto 14px;
    border-radius: 26px;
    display: grid;
    place-items: center;
    background: linear-gradient(145deg, rgba(34,197,94,.22), rgba(56,189,248,.14)), rgba(15,23,42,.92);
    border: 1px solid rgba(34,197,94,.34);
    box-shadow: 0 18px 50px rgba(34,197,94,.16), inset 0 1px 0 rgba(255,255,255,.08);
  }
  .brand-mark span { font-size: 28px; font-weight: 1000; letter-spacing: -.08em; color: #eafff1; }
  h1 { font-size: clamp(36px, 10vw, 48px); line-height: 1; font-weight: 1000; letter-spacing: -.07em; text-transform: uppercase; }
  .brand p { margin-top: 9px; color: var(--muted); font-size: 13px; font-weight: 800; line-height: 1.45; }
  .login-card {
    border-radius: 30px;
    padding: 22px;
    background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.018)), var(--card);
    border: 1px solid var(--line);
    box-shadow: 0 24px 70px rgba(0,0,0,.56);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 999px;
    background: rgba(34,197,94,.1);
    border: 1px solid rgba(34,197,94,.18);
    color: #86efac;
    font-size: 11px;
    font-weight: 950;
    text-transform: uppercase;
    letter-spacing: .1em;
  }
  .eyebrow i { width: 7px; height: 7px; border-radius: 999px; background: var(--green); box-shadow: 0 0 14px rgba(34,197,94,.9); }
  .card-head h2 { margin-top: 14px; font-size: 25px; line-height: 1.08; font-weight: 1000; letter-spacing: -.035em; }
  .card-head p { margin-top: 8px; margin-bottom: 18px; color: var(--muted); font-size: 13px; font-weight: 700; line-height: 1.45; }
  .field { margin-top: 14px; }
  .field label { display: block; margin: 0 0 8px 4px; color: #cbd5e1; font-size: 12px; font-weight: 900; letter-spacing: .04em; text-transform: uppercase; }
  .input-wrap { position: relative; }
  .input-wrap .icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #7dd3fc; font-size: 17px; opacity: .9; }
  input {
    width: 100%;
    min-height: 56px;
    padding: 16px 16px 16px 48px;
    border: 1px solid rgba(148,163,184,.24);
    border-radius: 18px;
    background: rgba(2,6,23,.58);
    color: var(--text);
    font-size: 16px;
    font-weight: 800;
    outline: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
  }
  input::placeholder { color: rgba(148,163,184,.72); font-weight: 750; }
  input:focus { border-color: rgba(34,197,94,.42); background: rgba(2,6,23,.78); box-shadow: 0 0 0 4px rgba(34,197,94,.11); }
  .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: 0; background: transparent; color: #93c5fd; font-size: 12px; font-weight: 950; padding: 10px; cursor: pointer; }
  .primary {
    width: 100%;
    min-height: 58px;
    margin-top: 18px;
    border: 0;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--green), #2dd4bf 45%, var(--cyan));
    color: #02120a;
    font-size: 16px;
    font-weight: 1000;
    cursor: pointer;
    box-shadow: 0 18px 42px rgba(34,197,94,.3);
    touch-action: manipulation;
  }
  .primary:active { transform: scale(.985); }
  .primary:disabled { opacity: .7; cursor: progress; }
  .row-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
  .link-btn { border: 0; background: transparent; color: #86efac; font-size: 13px; font-weight: 900; cursor: pointer; padding: 6px 2px; }
  .link-muted { color: var(--muted); font-size: 12px; font-weight: 800; }
  .error-box { display: none; margin-top: 14px; padding: 12px 13px; border-radius: 16px; background: var(--danger-bg); border: 1px solid rgba(251,113,133,.26); color: #fecdd3; font-size: 13px; font-weight: 850; line-height: 1.35; }
  .error-box.show { display: block; }
  .trust { margin-top: 18px; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--soft); font-size: 12px; font-weight: 850; }
  .trust span { width: 8px; height: 8px; border-radius: 999px; background: var(--green); box-shadow: 0 0 12px rgba(34,197,94,.85); }
  .version-note { margin-top: 16px; text-align: center; color: rgba(148,163,184,.58); font-size: 11px; font-weight: 800; }
  @media (max-width: 420px) {
    body { align-items: stretch; }
    .login-shell { display: flex; flex-direction: column; justify-content: center; }
    .login-card { border-radius: 28px; padding: 20px; }
  }
</style>
</head>
<body>
  <main class="login-shell" aria-label="Login Kronia">
    <section class="brand">
      <div class="brand-mark" aria-hidden="true"><span>K</span></div>
      <h1>KRONIA</h1>
      <p>Performance adaptativa com inteligência contextual.</p>
    </section>

    <section class="login-card">
      <div class="card-head">
        <span class="eyebrow"><i></i> Acesso seguro</span>
        <h2>Entre na sua conta</h2>
        <p>Sincronize treino, dieta, evolução e recomendações do KRONOS.</p>
      </div>

      <form id="loginForm" autocomplete="off" onsubmit="entrar(); return false;" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <div class="input-wrap">
            <span class="icon" aria-hidden="true">@</span>
            <input type="text" id="email" name="kronia_identifier" placeholder="seuemail@exemplo.com" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="email" data-lpignore="true" data-1p-ignore="true" />
          </div>
        </div>

        <div class="field">
          <label for="senha">Senha</label>
          <div class="input-wrap">
            <span class="icon" aria-hidden="true">●</span>
            <input type="password" id="senha" name="kronia_access_code" placeholder="Digite sua senha" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" data-lpignore="true" data-1p-ignore="true" />
            <button class="password-toggle" type="button" onclick="alternarSenha()">Ver</button>
          </div>
        </div>

        <button class="primary" id="btnEntrar" type="submit">Entrar na conta</button>

        <div class="row-actions">
          <button class="link-btn" type="button" onclick="recuperarSenha()">Esqueci minha senha</button>
          <span class="link-muted">Use o e-mail cadastrado</span>
        </div>

        <p class="error-box" id="erro" role="alert"></p>
      </form>

      <div class="trust"><span></span> Ambiente seguro KroniA</div>
    </section>

    <p class="version-note">KroniA Adaptive Core</p>
  </main>

<script>
let kroniaLoginClientPromise = null;

function setErro(message, type) {
  const el = document.getElementById('erro');
  if (!el) return;
  if (!message) { el.textContent = ''; el.classList.remove('show'); return; }
  el.textContent = message;
  el.classList.add('show');
  el.style.color = type === 'success' ? '#bbf7d0' : '#fecdd3';
  el.style.background = type === 'success' ? 'rgba(34,197,94,.10)' : 'rgba(248,113,113,.11)';
  el.style.borderColor = type === 'success' ? 'rgba(34,197,94,.28)' : 'rgba(251,113,133,.26)';
}

function setLoading(loading) {
  const btn = document.getElementById('btnEntrar');
  if (!btn) return;
  btn.disabled = !!loading;
  btn.textContent = loading ? 'Entrando...' : 'Entrar na conta';
}

function alternarSenha() {
  const input = document.getElementById('senha');
  const btn = document.querySelector('.password-toggle');
  if (!input || !btn) return;
  const visible = input.type === 'text';
  input.type = visible ? 'password' : 'text';
  btn.textContent = visible ? 'Ver' : 'Ocultar';
}

function parseAuthConstant(source, name) {
  const pattern = new RegExp('const\\s+' + name + '\\s*=\\s*[\\\"\\\']([^\\\"\\\']+)[\\\"\\\']');
  const match = String(source || '').match(pattern);
  return match ? match[1] : '';
}

async function getLoginSupabaseClient() {
  if (kroniaLoginClientPromise) return kroniaLoginClientPromise;
  kroniaLoginClientPromise = (async function() {
    if (!window.supabase || typeof window.supabase.createClient !== 'function') {
      throw new Error('Biblioteca de autenticação não carregou. Atualize a página.');
    }

    let url = '';
    let anonKey = '';

    try {
      const runtime = window.__KRONIA_ENV__ || {};
      url = String(window.KRONIA_SUPABASE_URL || runtime.SUPABASE_URL || runtime.NEXT_PUBLIC_SUPABASE_URL || localStorage.getItem('kronia_supabase_url') || '').trim();
      anonKey = String(window.KRONIA_SUPABASE_ANON_KEY || runtime.SUPABASE_ANON_KEY || runtime.NEXT_PUBLIC_SUPABASE_ANON_KEY || localStorage.getItem('kronia_supabase_anon_key') || '').trim();
    } catch (_) {}

    if (!url || !anonKey) {
      const response = await fetch('/auth.js?v=login-config-' + Date.now(), { cache: 'no-store' });
      const source = await response.text();
      url = url || parseAuthConstant(source, 'KRONIA_FALLBACK_SUPABASE_URL');
      anonKey = anonKey || parseAuthConstant(source, 'KRONIA_FALLBACK_SUPABASE_ANON_KEY');
    }

    if (!url || !anonKey) throw new Error('Configuração de login indisponível. Atualize a página.');
    return window.supabase.createClient(url, anonKey);
  })();
  return kroniaLoginClientPromise;
}

async function recuperarSenha() {
  const email = document.getElementById('email').value.trim();
  if (!email) { setErro('Digite seu e-mail primeiro para receber a recuperação de senha.'); return; }
  try {
    const client = await getLoginSupabaseClient();
    const { error } = await client.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + window.location.pathname });
    if (error) throw error;
    setErro('Enviamos um e-mail de recuperação de senha.', 'success');
  } catch (error) {
    setErro(error && error.message ? error.message : 'Não consegui enviar o e-mail de recuperação agora.');
  }
}

async function entrar() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  setErro('');
  if (!email || !senha) { setErro('Preencha e-mail e senha para entrar.'); return; }
  if (senha.length < 6) { setErro('A senha precisa ter pelo menos 6 caracteres.'); return; }
  setLoading(true);
  try {
    const client = await getLoginSupabaseClient();
    const { error } = await client.auth.signInWithPassword({ email, password: senha });
    if (error) { setErro(error.message === 'Invalid login credentials' ? 'E-mail ou senha incorretos.' : error.message); return; }
    window.location.replace('/');
  } catch (error) {
    setErro(error && error.message ? error.message : 'Não foi possível entrar agora. Tente novamente.');
  } finally {
    setLoading(false);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  try {
    const email = document.getElementById('email');
    const senha = document.getElementById('senha');
    [email, senha].forEach(function(input) {
      if (!input) return;
      input.setAttribute('autocomplete', 'off');
      input.addEventListener('focus', function() { setErro(''); });
    });
  } catch (_) {}
});
</script>
</body>
</html>

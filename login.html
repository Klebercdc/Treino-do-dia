<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0"/>
  <meta name="theme-color" content="#080c14"/>
  <meta name="color-scheme" content="dark"/>
  <title>Entrar — KRONIA</title>
  <link rel="icon" href="Kronia.png" type="image/png"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080c14;
      color: #f0f4ff;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #0f1724;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 40px 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }

    .logo span {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #f0f4ff;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #f0f4ff;
    }

    .subtitle {
      font-size: 14px;
      color: #8895b3;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #8895b3;
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: #151e30;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      color: #f0f4ff;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
      -webkit-appearance: none;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #4f7cff;
    }

    input::placeholder { color: #4a5568; }

    .btn-primary {
      width: 100%;
      background: #4f7cff;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      margin-top: 4px;
      letter-spacing: 0.02em;
    }

    .btn-primary:hover { background: #3d6be8; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .forgot {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #4f7cff;
      text-decoration: none;
      opacity: 0.85;
    }

    .forgot:hover { opacity: 1; }

    .divider {
      text-align: center;
      color: #3a4460;
      font-size: 12px;
      margin: 20px 0;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: #8895b3;
      text-decoration: none;
    }

    .back-link:hover { color: #f0f4ff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="Kronia.png" alt="KRONIA"/>
      <span>KRONIA</span>
    </div>

    <h1>Entrar na conta</h1>
    <p class="subtitle">Acesse seu treino e dieta personalizados</p>

    <div id="errorMsg" class="error-msg"></div>

    <form id="loginForm" autocomplete="on">
      <label for="email">E-mail</label>
      <input
        id="email"
        type="email"
        placeholder="seu@email.com"
        autocomplete="email"
        required
        inputmode="email"
      />

      <label for="password">Senha</label>
      <input
        id="password"
        type="password"
        placeholder="Mínimo 6 caracteres"
        autocomplete="current-password"
        required
      />

      <button id="submitBtn" type="submit" class="btn-primary">Entrar</button>
    </form>

    <a href="#" class="forgot" id="forgotLink">Esqueci minha senha</a>

    <div class="divider">ou</div>
    <a href="/" class="back-link">← Voltar ao app</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://twxoddzogbmaysebhour.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3eG9kZHpvZ2JtYXlzZWJob3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTk4MzgsImV4cCI6MjA4OTA3NTgzOH0.8xXiTS863_rtKOE3g2wDn7PdQVKCFj2hxhtnya3Wa5E';

    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Se já autenticado, vai direto pro app
    _sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) window.location.replace('/');
    });

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function clearError() {
      errorMsg.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Preencha e-mail e senha.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Entrando...';

      const { error } = await _sb.auth.signInWithPassword({ email, password });

      if (error) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';

        if (error.message.includes('Invalid login credentials')) {
          showError('E-mail ou senha incorretos.');
        } else if (error.message.includes('Email not confirmed')) {
          showError('Confirme seu e-mail antes de entrar.');
        } else {
          showError(error.message || 'Erro ao entrar. Tente novamente.');
        }
        return;
      }

      window.location.replace('/');
    });

    document.getElementById('forgotLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();

      if (!email) {
        showError('Digite seu e-mail acima para redefinir a senha.');
        emailInput.focus();
        return;
      }

      submitBtn.disabled = true;
      const { error } = await _sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/'
      });

      submitBtn.disabled = false;

      if (error) {
        showError(error.message || 'Erro ao enviar e-mail de redefinição.');
      } else {
        errorMsg.style.background = 'rgba(34,197,94,0.12)';
        errorMsg.style.borderColor = 'rgba(34,197,94,0.3)';
        errorMsg.style.color = '#86efac';
        showError('E-mail de redefinição enviado! Verifique sua caixa de entrada.');
      }
    });
  </script>
</body>
</html>

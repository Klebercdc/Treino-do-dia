<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#020617">
<title>Kronia — Entrar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #020617;
    --card: rgba(15, 23, 42, 0.78);
    --line: rgba(148, 163, 184, 0.18);
    --line-strong: rgba(34, 197, 94, 0.42);
    --text: #f8fafc;
    --muted: #94a3b8;
    --soft: #64748b;
    --green: #22c55e;
    --danger-bg: rgba(248, 113, 113, 0.11);
    --shadow: 0 24px 70px rgba(0, 0, 0, 0.56);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
  }

  body {
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
    overflow: hidden;
    position: relative;
  }

  body::before, body::after {
    content: "";
    position: fixed;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    filter: blur(24px);
    opacity: 0.72;
    pointer-events: none;
  }

  body::before {
    top: -180px;
    right: -160px;
    background: radial-gradient(circle, rgba(34, 197, 94, 0.42), rgba(14, 165, 233, 0.08) 50%, transparent 72%);
  }

  body::after {
    left: -180px;
    bottom: -170px;
    background: radial-gradient(circle, rgba(14, 165, 233, 0.34), rgba(34, 197, 94, 0.06) 54%, transparent 73%);
  }

  .login-shell {
    width: 100%;
    max-width: 430px;
    position: relative;
    z-index: 1;
  }

  .brand {
    text-align: center;
    margin-bottom: 22px;
  }

  .brand-mark {
    width: 74px;
    height: 74px;
    margin: 0 auto 14px;
    border-radius: 26px;
    display: grid;
    place-items: center;
    background: linear-gradient(145deg, rgba(34, 197, 94, 0.22), rgba(14, 165, 233, 0.14)), rgba(15, 23, 42, 0.88);
    border: 1px solid rgba(34, 197, 94, 0.34);
    box-shadow: 0 18px 50px rgba(34, 197, 94, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }

  .brand-mark span {
    font-size: 28px;
    font-weight: 1000;
    letter-spacing: -0.08em;
    color: #eafff1;
  }

  .brand h1 {
    font-size: clamp(34px, 10vw, 46px);
    line-height: 1;
    font-weight: 1000;
    letter-spacing: -0.07em;
    text-transform: uppercase;
    text-shadow: 0 0 28px rgba(34, 197, 94, 0.16);
  }

  .brand p {
    margin-top: 9px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.02em;
    line-height: 1.45;
  }

  .login-card {
    border-radius: 30px;
    padding: 22px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.018)), var(--card);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
  }

  .card-head {
    margin-bottom: 18px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #86efac;
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.18);
    border-radius: 999px;
    padding: 7px 10px;
    font-size: 11px;
    font-weight: 950;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .eyebrow i {
    width: 7px;
    height: 7px;
    border-radius: 999px;
    background: var(--green);
    box-shadow: 0 0 14px rgba(34, 197, 94, 0.9);
  }

  .card-head h2 {
    margin-top: 14px;
    font-size: 25px;
    line-height: 1.08;
    font-weight: 1000;
    letter-spacing: -0.035em;
  }

  .card-head p {
    margin-top: 8px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    line-height: 1.45;
  }

  .field {
    margin-top: 14px;
  }

  .field label {
    display: block;
    margin: 0 0 8px 4px;
    color: #cbd5e1;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap .icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #7dd3fc;
    font-size: 17px;
    opacity: 0.9;
  }

  input {
    width: 100%;
    min-height: 56px;
    padding: 16px 16px 16px 48px;
    border: 1px solid rgba(148, 163, 184, 0.24);
    border-radius: 18px;
    background: rgba(2, 6, 23, 0.58);
    color: var(--text);
    font-size: 16px;
    font-weight: 800;
    outline: none;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
  }

  input::placeholder {
    color: rgba(148, 163, 184, 0.72);
    font-weight: 750;
  }

  input:focus {
    border-color: var(--line-strong);
    background: rgba(2, 6, 23, 0.78);
    box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.11), inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }

  .password-toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    border: 0;
    background: transparent;
    color: #93c5fd;
    font-size: 12px;
    font-weight: 950;
    padding: 10px;
    width: auto;
    min-height: auto;
    box-shadow: none;
    cursor: pointer;
  }

  .actions {
    margin-top: 18px;
  }

  button.primary {
    width: 100%;
    min-height: 58px;
    border: 0;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--green), #2dd4bf 45%, #38bdf8);
    color: #02120a;
    font-size: 16px;
    font-weight: 1000;
    letter-spacing: -0.015em;
    cursor: pointer;
    box-shadow: 0 18px 42px rgba(34, 197, 94, 0.3);
    transition: transform .16s ease, opacity .16s ease, filter .16s ease;
  }

  button.primary:active {
    transform: scale(0.985);
  }

  button.primary:disabled {
    opacity: 0.7;
    filter: grayscale(0.1);
    cursor: progress;
  }

  .row-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 15px;
    flex-wrap: wrap;
  }

  .link-btn {
    border: 0;
    background: transparent;
    color: #86efac;
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    padding: 6px 2px;
  }

  .link-muted {
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
  }

  .error-box {
    display: none;
    margin-top: 14px;
    padding: 12px 13px;
    border-radius: 16px;
    background: var(--danger-bg);
    border: 1px solid rgba(251, 113, 133, 0.26);
    color: #fecdd3;
    font-size: 13px;
    font-weight: 850;
    line-height: 1.35;
  }

  .error-box.show {
    display: block;
  }

  .trust {
    margin-top: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--soft);
    font-size: 12px;
    font-weight: 850;
  }

  .trust span {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--green);
    box-shadow: 0 0 12px rgba(34, 197, 94, 0.85);
  }

  .version-note {
    margin-top: 16px;
    text-align: center;
    color: rgba(148, 163, 184, 0.58);
    font-size: 11px;
    font-weight: 800;
  }

  @media (max-width: 420px) {
    body {
      align-items: stretch;
      padding-left: 16px;
      padding-right: 16px;
    }

    .login-shell {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-card {
      border-radius: 28px;
      padding: 20px;
    }

    .brand {
      margin-bottom: 18px;
    }
  }
</style>
</head>
<body>
  <main class="login-shell" aria-label="Login Kronia">
    <section class="brand">
      <div class="brand-mark" aria-hidden="true"><span>K</span></div>
      <h1>KRONIA</h1>
      <p>Performance adaptativa com inteligência contextual.</p>
    </section>

    <section class="login-card">
      <div class="card-head">
        <span class="eyebrow"><i></i> Acesso seguro</span>
        <h2>Entre na sua conta</h2>
        <p>Sincronize treino, dieta, evolução e recomendações do KRONOS.</p>
      </div>

      <form onsubmit="entrar(); return false;" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <div class="input-wrap">
            <span class="icon" aria-hidden="true">@</span>
            <input type="email" id="email" placeholder="seuemail@exemplo.com" autocomplete="email" inputmode="email" />
          </div>
        </div>

        <div class="field">
          <label for="senha">Senha</label>
          <div class="input-wrap">
            <span class="icon" aria-hidden="true">●</span>
            <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password" />
            <button class="password-toggle" type="button" onclick="alternarSenha()">Ver</button>
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="btnEntrar" type="submit">Entrar na conta</button>
        </div>

        <div class="row-actions">
          <button class="link-btn" type="button" onclick="recuperarSenha()">Esqueci minha senha</button>
          <span class="link-muted">Use o e-mail cadastrado</span>
        </div>

        <p class="error-box" id="erro" role="alert"></p>
      </form>

      <div class="trust"><span></span> Ambiente seguro KroniA</div>
    </section>

    <p class="version-note">KroniA Adaptive Core</p>
  </main>

<script src="/auth.js?v=login-premium"></script>
<script>
function getSupabaseClient() {
  return window._sb || (typeof _sb !== 'undefined' ? _sb : null);
}

function setErro(message, type) {
  const el = document.getElementById('erro');
  if (!el) return;
  if (!message) {
    el.textContent = '';
    el.classList.remove('show');
    return;
  }
  el.textContent = message;
  el.classList.add('show');
  el.style.color = type === 'success' ? '#bbf7d0' : '#fecdd3';
  el.style.background = type === 'success' ? 'rgba(34,197,94,.10)' : 'rgba(248,113,113,.11)';
  el.style.borderColor = type === 'success' ? 'rgba(34,197,94,.28)' : 'rgba(251,113,133,.26)';
}

function setLoading(loading) {
  const btn = document.getElementById('btnEntrar');
  if (!btn) return;
  btn.disabled = !!loading;
  btn.textContent = loading ? 'Entrando...' : 'Entrar na conta';
}

function alternarSenha() {
  const input = document.getElementById('senha');
  const btn = document.querySelector('.password-toggle');
  if (!input || !btn) return;
  const visible = input.type === 'text';
  input.type = visible ? 'password' : 'text';
  btn.textContent = visible ? 'Ver' : 'Ocultar';
}

async function recuperarSenha() {
  const email = document.getElementById('email').value.trim();
  const client = getSupabaseClient();
  if (!client) {
    setErro('Cliente de autenticação indisponível. Atualize a página.');
    return;
  }
  if (!email) {
    setErro('Digite seu e-mail primeiro para receber a recuperação de senha.');
    return;
  }

  try {
    const { error } = await client.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + window.location.pathname
    });
    if (error) throw error;
    setErro('Enviamos um e-mail de recuperação de senha.', 'success');
  } catch (error) {
    setErro(error && error.message ? error.message : 'Não consegui enviar o e-mail de recuperação agora.');
  }
}

async function entrar() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const client = getSupabaseClient();

  setErro('');

  if (!client) {
    setErro('Cliente de autenticação indisponível. Atualize a página.');
    return;
  }

  if (!email || !senha) {
    setErro('Preencha e-mail e senha para entrar.');
    return;
  }

  if (senha.length < 6) {
    setErro('A senha precisa ter pelo menos 6 caracteres.');
    return;
  }

  setLoading(true);

  try {
    const { error } = await client.auth.signInWithPassword({ email, password: senha });
    if (error) {
      setErro(error.message === 'Invalid login credentials' ? 'E-mail ou senha incorretos.' : error.message);
      return;
    }
    window.location.replace('/');
  } catch (error) {
    setErro(error && error.message ? error.message : 'Não foi possível entrar agora. Tente novamente.');
  } finally {
    setLoading(false);
  }
}
</script>
</body>
</html>

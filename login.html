<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kronia — Entrar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080c14; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.box { width: 100%; max-width: 400px; padding: 40px 24px; }
h1 { font-size: 24px; margin-bottom: 32px; text-align: center; }
input { width: 100%; padding: 14px; background: #1a1f2e; border: 1px solid #2a3040; border-radius: 8px; color: white; font-size: 16px; margin-bottom: 16px; }
button { width: 100%; padding: 14px; background: #0055FF; border: none; border-radius: 8px; color: white; font-size: 16px; cursor: pointer; }
.erro { color: #ff4444; margin-top: 12px; text-align: center; font-size: 14px; }
</style>
</head>
<body>
<div class="box">
  <h1>KRONIA</h1>
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="senha" placeholder="Senha" />
  <button onclick="entrar()">Entrar na conta</button>
  <p class="erro" id="erro"></p>
</div>
<script>
const _sb = supabase.createClient(
  'https://twxoddzogbmaysebhour.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3eG9kZHpvZ2JtYXlzZWJob3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTk4MzgsImV4cCI6MjA4OTA3NTgzOH0.8xXiTS863_rtKOE3g2wDn7PdQVKCFj2hxhtnya3Wa5E'
);
async function entrar() {
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  const { error } = await _sb.auth.signInWithPassword({ email, password: senha });
  if (error) { document.getElementById('erro').textContent = 'Email ou senha incorretos'; return; }
  window.location.href = '/';
}
</script>
</body>
</html>
